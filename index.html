<!doctype html>
<html lang="en" data-colourscheme="dark">
<head>
	<title>Screensaver v0.1.0 by ldpercy</title>
	<meta charset="utf-8">
	<link rel="icon" href="./favicon.svg">
	<link rel="stylesheet" href="./app/screensaverApp.css"/>
	<script  type="module"  src="./app/screensaverApp.js"></script>
</head>
<body >

	<div class="control-group control-left">


		<form id="form-screensaver" name="form-screensaver">
			<header>
				<h1><a href="">Screensaver</a></h1>
			</header>

			<button type="button" id="button-playPause"><strong>⏯ play / pause</strong></button>

			<a id="link-save" href="#save" title="Save">Save 🖫</a>  <!-- download="foo.text" -->
			<button type="button" id="button-showAppInfo"><strong>🛈 Screensaver help</strong></button>


			<select name="screensaver" id="select-screensaver" size="5">
				<option value="polygon">polygon</option>
				<option value="circle">circle</option>
				<option value="line">line</option>
				<option value="bezier">bezier</option>
				<option value="rect">rect</option>
			</select>


		</form>
		<form id="form-screensaver-settings">
			<!--
			This will be populated by the individual screensaver
			-->
		</form>

	</div>

	<div class="control-group control-right">



		<form id="form-style" name="form-style">
			<h2>Style</h2>

			<select name="preset" id="input-style-preset">
				<option value="defaultStyle">default style</option>
				<option>light</option>
				<option>dark</option>
				<option>disco</option>
				<option>midnightblue</option>
				<option>peachpuff</option>
			</select>


			<details open>
				<summary><h3>fill</h3></summary>
				<div>
					<!-- <label></label> -->
					<label for="input-startColour">colour</label>
					<input type="color" name="startColour" id="input-startColour" value="#ffa500">


					<label for="input-fillOpacity">
						fill-opacity
					</label>
					<input type="range" name="fillOpacity" id="input-fillOpacity" value="0.5" min="0" max="1" step="0.1">

					<label for="input-fillRule">fill rule</label>
					<select id="input-fillRule" name="fillRule" size="1">
						<option value="evenodd" selected>evenodd</option>
						<option value="nonzero">nonzero</option>
					</select>
				</div>
			</details>



			<details open>
				<summary><h3>stroke</h3></summary>
				<div>

					<label for="input-strokeWidth">stroke-width</label>
					<input
						id="input-strokeWidth"
						type="string"
						name="strokeWidth"
						title="stroke-width"
						value="2em"
					>

					<label for="input-strokeLinejoin">stroke-linejoin</label>
					<select id="input-strokeLinejoin" name="strokeLinejoin">
						<option value="miter" selected>miter</option>
						<option value="round">round</option>
						<option value="bevel">bevel</option>
						<option value="arcs">arcs (unsupported)</option>
						<option value="miter-clip">miter-clip (unsupported)</option>
					</select>


					<label><h4>stroke-dash</h4></label>

					<label for="input-antCrawl">
						<input type="checkbox" name="antCrawl" id="input-antCrawl">
						dash & animate
					</label>

					<label for="input-strokeDasharray">stroke-dasharray</label>
					<input
						id="input-strokeDasharray"
						type="string"
						name="strokeDasharray"
						title="stroke-dasharray"
						value="1ex 10ex"
					>

					<label for="input-strokeLinecap">stroke-linecap</label>
					<select id="input-strokeLinecap" name="strokeLinecap">
						<option selected>butt</option>
						<option>round</option>
						<option>square</option>
					</select>

				</div>
			</details>


			<label><h3>page</h3></label>

			<label>blend mode</label>
			<select id="input-blendMode" name="blend mode" size="5">
				<option>normal</option>
				<option>multiply</option>
				<option>screen</option>
				<option>overlay</option>
				<option>darken</option>
				<option>lighten</option>
				<option>color-dodge</option>
				<option>color-burn</option>
				<option>hard-light</option>
				<option>soft-light</option>
				<option>difference</option>
				<option>exclusion</option>
				<option>hue</option>
				<option>saturation</option>
				<option>color</option>
				<option>luminosity</option>
				<option>plus-darker</option>
				<option>plus-lighter</option>
			</select>


			<label for="input-showGrid">
				<input type="checkbox" name="showGrid" id="input-showGrid">
				grid
			</label>
		</form>



	</div>

	<output id="screensaver-output">
		<svg id="screensaver-svg" class="svg-screensaver" viewBox="-1200 -1200 2400 2400" preserveAspectRatio="xMidYMid meet" >

			<title>screensaver</title>
			<g class="graphPaper" id="group-grid">
				<pattern id="pattern-graphPaper" width="100" height="100" patternUnits="userSpaceOnUse">
					<rect style="stroke: teal; stroke-width: 1px; fill:none;" x="0" y="0" width="100" height="100"/>
				</pattern>
				<rect class="viewBox" style="x: -100%; y: -100%; width: 200%; height: 200%; stroke:none; fill: url(#pattern-graphPaper);"/>
				<line x1="-100%" y1="0" x2="100%" y2="0" style="stroke: teal; stroke-width: 2px;"><title>x-axis</title></line>
				<line x1="0" y1="-100%" x2="0" y2="100%" style="stroke: teal; stroke-width: 2px;"><title>y-axis</title></line>
				<circle r="10" style="stroke: teal; stroke-width: 2px; fill:none;"><title>origin</title></circle>
			</g>

			<defs></defs>

			<g id="screensaver-group" class="evenodd"></g>
			<!--
			<rect x="-99%" y="-99%" width="199%" height="199%" style="fill:none;stroke:pink; stroke-width:2em;"/>
			-->
		</svg>
	</output>


	<dialog id="dialog-appInfo" closedby="any">
		<h1>
			<a href="https://github.com/ldpercy/screensaver/">Screensaver</a>
			<a href="https://github.com/ldpercy/screensaver/releases/tag/v0.1.0">v0.1.0</a>
			by <a href="https://github.com/ldpercy/">ldpercy</a>
		</h1>

		<h2>Keyboard shortcuts</h2>
		<dl>
			<dt><kbd>␣</kbd> (space)</dt>
			<dd>Toggle play/pause</dd>

			<dt><kbd>?</kbd></dt>
			<dd>Show this dialog</dd>
		</dl>


	</dialog>


</body>
</html>
