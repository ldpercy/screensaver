<!doctype html>
<html lang="en" data-colourscheme="dark">
<head>
	<title>Screensaver v0.🔧🪛 by ldpercy</title>
	<meta charset="utf-8">
	<link rel="icon" href="./favicon.svg">
	<link rel="stylesheet" href="./app/index.css"/>
	<script  type="module"  src="./app/screensaverApp.js"></script>
</head>
<body >

	<div class="panel-group group-left">

		<form id="form-screensaver" name="form-screensaver" class="ui-panel">
			<header>
				<h1><a href="">Screensaver</a></h1>
			</header>

			<button type="button" id="button-playPause" data-play-state="foobar">
				play/pause
			</button>

			<label for="input-mainInterval">interval</label>
			<input
				id="input-mainInterval"
				type="number"
				name="mainInterval"
				title="main interval (ms)"
				value="1000">



			<select name="screensaver" id="select-screensaver" size="5">
				<option value="bezier">bezier</option>
				<option value="polygon">polygon</option>
				<option value="line">line</option>
				<option value="circle">circle</option>
				<option value="rect">rect</option>
				<option value="foldout">foldout</option>
			</select>

			<a id="link-save" href="#save" title="Save">Save 🖫</a>  <!-- download="foo.text" -->
			<button type="button" id="button-showAppInfo"><strong>🛈 Screensaver help</strong></button>





		</form>
		<form id="form-moduleSettings" name="moduleSettings" class="ui-panel">
			<!--
			This will be populated by the individual screensaver module
			-->
		</form>

	</div>



	<div class="panel-group group-right">


		<form id="form-style" name="form-style" class="ui-panel">
			<h2>Style</h2>

			<select name="preset" id="input-style-preset">
				<option value="defaultStyle">default style</option>
				<option>light</option>
				<option>dark</option>
				<option>goldenrod</option>
				<option>midnightblue</option>
				<option>peachpuff</option>
				<option>forestgreen</option>
				<option>darkmagenta</option>
				<option>machine</option>
			</select>

			<details open>
				<summary><h3>page</h3></summary>
				<div>
					<label for="input-pageColour" class="colourWithRandom">
						colour
						<div>
							<input type="color" name="pageColour" id="input-pageColour" value="#0a0a0a">
							<button type="button" name="pageColourRandom" id="button-pageColourRandom">🎲</button>
						</div>
					</label>

					<label for="input-blendMode">blend mode</label>
					<select id="input-blendMode" name="blend mode" size="1">
						<option>normal</option>
						<option>multiply</option>
						<option>screen</option>
						<option>overlay</option>
						<option>darken</option>
						<option>lighten</option>
						<option>color-dodge</option>
						<option>color-burn</option>
						<option>hard-light</option>
						<option>soft-light</option>
						<option>difference</option>
						<option>exclusion</option>
						<option>hue</option>
						<option>saturation</option>
						<option>color</option>
						<option>luminosity</option>
						<option>plus-darker</option>
						<option>plus-lighter</option>
					</select>
				</div>
			</details><!-- page -->

			<details open>
				<summary><h3>animation</h3></summary>
				<div>
					<label for="input-animation">animation</label>
					<select id="input-animation" name="animation" size="1">
						<option>none</option>
						<optgroup label="stroke-width:">
							<option value="stroke-linear">		linear		</option>
						</optgroup>
						<optgroup label="stroke-dash:">
							<option value="dash-linear">		linear		</option>
							<option value="dash-ease">			ease		</option>
							<option value="dash-pulse">			pulse		</option>
							<option value="dash-alternate">		alternate	</option>
							<option value="dash-steps">			steps		</option>
							<option value="dash-mechanical">	mechanical	</option>
						</optgroup>
					</select>

					<label for="input-animationExponent" class="zoom" title="animation exponent">exponent</label>
					<input type="range" name="animationExponent" id="input-animationExponent" value="0" min="-2" max="2" list="datalist-animationExponent"/>
					<datalist id="datalist-animationExponent">
						<option value="-2">-2</option>
						<option value="-1">-1</option>
						<option value="0">0</option>
						<option value="1">+1</option>
						<option value="2">+2</option>
					</datalist>

				</div>
			</details><!-- animation -->






			<details open>
				<summary><h3>fill</h3></summary>
				<div>
					<label for="input-fillColour" class="colourWithRandom">
						colour
						<div>
						<input type="color" name="fillColour" id="input-fillColour" value="#00ffff">
						<button type="button" name="fillColourRandom" id="button-fillColourRandom">🎲</button>
						</div>
					</label>

					<label for="input-fillOpacity">
						fill-opacity
					</label>
					<input type="range" name="fillOpacity" id="input-fillOpacity" value="0.7" min="0" max="1" step="0.1">

					<label for="input-fillRule">fill rule</label>
					<select id="input-fillRule" name="fillRule" size="1">
						<option value="evenodd" selected>evenodd</option>
						<option value="nonzero">nonzero</option>
					</select>
				</div>
			</details><!-- fill -->


			<details open>
				<summary><h3>stroke</h3></summary>
				<div>
					<label for="input-strokeColour" class="colourWithRandom">
						colour
						<div>
						<input type="color" name="strokeColour" id="input-strokeColour" value="#ffa500">
						<button type="button" name="fillColourRandom" id="button-strokeColourRandom">🎲</button>
						</div>
					</label>

					<label for="input-strokeOpacity">
						stroke-opacity
					</label>
					<input type="range" name="strokeOpacity" id="input-strokeOpacity" value="0.7" min="0" max="1" step="0.1">


					<label for="input-strokeWidth">stroke-width</label>
					<input
						id="input-strokeWidth"
						type="text"
						name="strokeWidth"
						title="stroke-width"
						value="5mm"
					>

					<label for="input-strokeLinejoin">stroke-linejoin</label>
					<select id="input-strokeLinejoin" name="strokeLinejoin" size="3">
						<option value="miter" selected>miter</option>
						<option value="round">round</option>
						<option value="bevel">bevel</option>
						<option value="arcs">arcs (unsupported)</option>
						<option value="miter-clip">miter-clip (unsupported)</option>
					</select>
					<label for="input-strokeLinecap">stroke-linecap</label>
					<select id="input-strokeLinecap" name="strokeLinecap" size="3">
						<option selected>butt</option>
						<option>round</option>
						<option>square</option>
					</select>

					<label for="input-strokeDash">
						<input type="checkbox" name="strokeDash" id="input-strokeDash">
						<h4>stroke-dash</h4>
					</label>

					<label for="input-strokeDasharray">stroke-dasharray</label>
					<input
						id="input-strokeDasharray"
						type="text"
						name="strokeDasharray"
						title="stroke-dasharray"
						value="5cm 5cm"
					>

				</div>
			</details><!-- stroke -->



		</form>



	</div>

	<output
		id="screensaver-output"
		data-stroke-dash="false"
		data-animation="none"
		>

		<svg id="screensaver-svg" class="svg-screensaver" viewBox="-1200 -1200 2400 2400" preserveAspectRatio="xMidYMid meet" >

			<g class="graphPaper" id="group-grid" style="display:none;">
				<pattern id="pattern-graphPaper" width="100" height="100" patternUnits="userSpaceOnUse">
					<rect style="stroke: teal; stroke-width: 1px; fill:none;" x="0" y="0" width="100" height="100"/>
				</pattern>
				<rect class="viewBox" style="x: -100%; y: -100%; width: 200%; height: 200%; stroke:none; fill: url(#pattern-graphPaper);"/>
				<line x1="-100%" y1="0" x2="100%" y2="0" style="stroke: teal; stroke-width: 2px;"><title>x-axis</title></line>
				<line x1="0" y1="-100%" x2="0" y2="100%" style="stroke: teal; stroke-width: 2px;"><title>y-axis</title></line>
				<circle r="10" style="stroke: teal; stroke-width: 2px; fill:none;"><title>origin</title></circle>
			</g>

			<defs></defs>

			<g id="screensaver-group" class="evenodd"></g>

		</svg>
		<!--
		<rect x="-99%" y="-99%" width="199%" height="199%" style="fill:none;stroke:pink; stroke-width:2em;"/>
		-->
	</output>


	<dialog id="dialog-appInfo" closedby="any">
		<h1>
			<a href="https://github.com/ldpercy/screensaver/">Screensaver</a>
			<a href="https://github.com/ldpercy/screensaver/releases/tag/v0.🔧🪛">v0.🔧🪛</a>
			by <a href="https://github.com/ldpercy/">ldpercy</a>
		</h1>

		<h2>Keyboard shortcuts</h2>
		<dl>
			<dt><kbd>␣</kbd> (space)</dt>
			<dd>Toggle play/pause</dd>

			<dt><kbd>.</kbd> (full stop)</dt>
			<dd>Step forward (auto-pauses)</dd>

			<dt><kbd>?</kbd></dt>
			<dd>Show this dialog</dd>
		</dl>


	</dialog>


</body>
</html>
