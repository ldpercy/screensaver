<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" width="100%" height="100%"	preserveAspectRatio="xMidYMid meet">
	<title>screensaver favicon</title>

	<style>
		rect { mix-blend-mode: exclusion; }
		.horizontal	{ fill-opacity: 0.42; }
		.vertical	{ fill-opacity: 1.00; }
	</style>

	<g class="vertical">
		<rect style="fill:#f00; x:-32px; y:-32px; width:16px; height:64px;"/>
		<rect style="fill:#0f0; x:-16px; y:-32px; width:16px; height:64px;"/>
		<rect style="fill:#00f; x:+00px; y:-32px; width:16px; height:64px;"/>
		<rect style="fill:#fff; x:+16px; y:-32px; width:16px; height:64px;"/>
	</g>

	<g class="horizontal">
		<rect style="fill:#f00; x:-32px; y:-32px; width:64px; height:16px;"/>
		<rect style="fill:#0f0; x:-32px; y:-16px; width:64px; height:16px;"/>
		<rect style="fill:#00f; x:-32px; y:+00px; width:64px; height:16px;"/>
		<rect style="fill:#fff; x:-32px; y:+16px; width:64px; height:16px;"/>
	</g>

</svg>